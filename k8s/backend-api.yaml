apiVersion: apps/v1
kind: Deployment
metadata:
  name: avd-cost-api
  namespace: avd-finops-prod
  labels:
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      component: api
  template:
    metadata:
      labels:
        component: api
    spec:
      containers:
      - name: gateway
        image: acrfinops.azurecr.io/devopstrio/cost-api:v2.1.0
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: finops-secrets
              key: db-url
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: avd-cost-svc
  namespace: avd-finops-prod
spec:
  selector:
    component: api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: optimizer-engine
  namespace: avd-finops-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      component: optimizer
  template:
    metadata:
      labels:
        component: optimizer
    spec:
      containers:
      - name: engine
        image: acrfinops.azurecr.io/devopstrio/optimizer-engine:latest
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finops-ingress
  namespace: avd-finops-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: finops.devopstrio.co.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: avd-cost-svc
            port:
              number: 80
